<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Sign In — Smart Resource Management</title>
  <meta name="description" content="Sign in to the Smart Resource Management dashboard." />
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body class="login-page">

  <!-- Ambient orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">SRM</div>

    <h1 class="login-heading">Welcome back</h1>
    <p class="login-sub">Sign in to your Smart Resource dashboard</p>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <div class="input-wrap">
          <span class="icon">✉</span>
          <input id="email" class="field field-icon" type="email" placeholder="admin@example.com" autocomplete="email"
            required />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <span class="icon"></span>
          <input id="password" class="field field-icon" type="password" placeholder="••••••••"
            autocomplete="current-password" required />
        </div>
      </div>

      <!-- Error banner -->
      <div id="login-error" class="login-error" role="alert"></div>

      <button id="login-btn" class="login-btn" type="submit">
        Sign In
      </button>
    </form>

    <p class="login-footer">Smart Resource Management &copy; 2025</p>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>

</html>
